<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; background: #A8D5E8; }
        #errMsg {
            display: none;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); padding: 16px 28px;
            border-radius: 10px; font-family: sans-serif; font-size: 15px;
            color: #333; z-index: 999; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #legend {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(255,255,255,0.95); padding: 10px 12px;
            border-radius: 14px; font-family: sans-serif; font-size: 11px;
            color: #1a1a1a; z-index: 9999; font-weight: 600;
            box-shadow: 0 4px 12px rgba(10, 77, 104, 0.15);
        }
        #legend .row { display: flex; align-items: center; margin: 3px 0; }
        #legend .swatch {
            width: 14px; height: 14px; margin-right: 8px;
            border-radius: 4px; border: 1px solid #fff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div id="map"></div>
<div id="errMsg">Failed to load map. Check internet connection.</div>
<div id="legend">
    <div class="row"><span class="swatch" style="background:#2D6A4F"></span><span id="lblVisited">Visited</span></div>
    <div class="row"><span class="swatch" style="background:#F4A261"></span><span id="lblBucket">Wishlist</span></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
    var map = L.map('map', {
        center: [20, 0], zoom: 2, minZoom: 1, maxZoom: 8,
        zoomControl: true, attributionControl: false,
        tap: true, tapTolerance: 30
    });

    var visited = {};
    var bucket = {};
    var layers = {};

    function styleFor(code) {
        if (visited[code]) {
            return { fillColor: '#2D6A4F', fillOpacity: 0.82, weight: 0.7, color: '#fff', opacity: 1 };
        }
        if (bucket[code]) {
            return { fillColor: '#F4A261', fillOpacity: 0.72, weight: 0.7, color: '#fff', opacity: 1 };
        }
        return { fillColor: '#3D7A9C', fillOpacity: 0.55, weight: 0.7, color: '#fff', opacity: 1 };
    }

    function markCountry(code, isVisited) {
        visited[code] = isVisited;
        if (layers[code]) layers[code].setStyle(styleFor(code));
    }

    function markBucket(code, isWanted) {
        bucket[code] = isWanted;
        if (layers[code]) layers[code].setStyle(styleFor(code));
    }

    function setLegendLabels(visitedLabel, bucketLabel) {
        document.getElementById('lblVisited').textContent = visitedLabel;
        document.getElementById('lblBucket').textContent = bucketLabel;
    }

    function handleCountryClick(code, name, layer) {
        if (!code || code === '-99') return;
        if (typeof Android !== 'undefined') {
            Android.openCountryDetail(code);
        }
    }

    function initMap(data, codeField, nameField) {
        L.geoJSON(data, {
            style: function(f) {
                var code = String(f.properties[codeField] || '').toUpperCase();
                return styleFor(code);
            },
            onEachFeature: function(f, layer) {
                var code = String(f.properties[codeField] || '').toUpperCase();
                var name = String(f.properties[nameField] || '');
                if (code && code !== '-99') layers[code] = layer;
                layer.on('click', function() { handleCountryClick(code, name, layer); });
            }
        }).addTo(map);
    }

    function tryLoad(sources) {
        if (sources.length === 0) {
            document.getElementById('errMsg').style.display = 'block';
            return;
        }
        var src = sources[0];
        fetch(src.url)
            .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(function(data) { initMap(data, src.codeField, src.nameField); })
            .catch(function() { tryLoad(sources.slice(1)); });
    }

    tryLoad([
        { url: 'https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_110m_admin_0_countries.geojson',
          codeField: 'iso_a2', nameField: 'name' },
        { url: 'https://cdn.jsdelivr.net/gh/datasets/geo-countries/data/countries.geojson',
          codeField: 'ISO_A2', nameField: 'ADMIN' },
        { url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
          codeField: 'ISO_A2', nameField: 'ADMIN' }
    ]);
</script>
</body>
</html>
